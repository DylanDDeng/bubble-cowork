name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.1). Optional when running on a tag push."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]

    env:
      # Publish unsigned artifacts (no Apple Developer ID in CI)
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Python for node-gyp
        shell: bash
        run: |
          echo "PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "npm_config_python=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install macOS x64 Claude runtime
        if: runner.os == 'macOS'
        shell: bash
        run: |
          CLAUDE_AGENT_SDK_VERSION="$(node -p "require('./node_modules/@anthropic-ai/claude-agent-sdk/package.json').version")"
          CLAUDE_X64_PACKAGE="@anthropic-ai/claude-agent-sdk-darwin-x64"
          CLAUDE_X64_DIR="node_modules/@anthropic-ai/claude-agent-sdk-darwin-x64"
          CLAUDE_X64_TARBALL="$(npm pack --force "$CLAUDE_X64_PACKAGE@$CLAUDE_AGENT_SDK_VERSION" --pack-destination "$RUNNER_TEMP" | tail -n 1)"
          rm -rf "$CLAUDE_X64_DIR"
          mkdir -p "$CLAUDE_X64_DIR"
          tar -xzf "$RUNNER_TEMP/$CLAUDE_X64_TARBALL" -C "$CLAUDE_X64_DIR" --strip-components=1
          chmod +x "$CLAUDE_X64_DIR/claude"

      - name: Build (Vite + TS)
        run: npm run build

      - name: Package (electron-builder)
        run: npm run build:electron -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.zip
            release/*.blockmap
            release/latest*.yml
            release/latest*.yaml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
